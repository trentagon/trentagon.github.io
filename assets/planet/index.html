<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body {
        padding: 0;
        margin: 0;
        background: #000;
      }

      #planet-sketch-container {
        position: relative;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
      }

      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 20px;
        background: white;
        border: 2px solid white;
        border-radius: 0;
        cursor: pointer;
      }

      input[type='range']::-moz-range-thumb {
        width: 16px;
        height: 20px;
        background: white;
        border: 2px solid white;
        border-radius: 0;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="planet-sketch-container"></div>
    <script src="/assets/libraries/p5.min.js"></script>
    <script src="/assets/planet/planet.js"></script>
  </body>
</html>
