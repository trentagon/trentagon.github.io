<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planet.Gen</title>
    <link rel="icon" type="image/png" sizes="96x96" href="/assets/favicon-96x96.png" />
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <style>
      body {
        padding: 0;
        margin: 0;
        background: #000;
        /* Scroll vertically when the mobile layout grows the shell taller
           than the viewport (planet above, slider panel below) */
        overflow-x: hidden;
        overflow-y: auto;
      }

      canvas {
        display: block;
      }

      #planet-sketch-container {
        position: relative;
        overflow: hidden;
        width: 100%;
        height: 100vh;
      }

      input[type='range'] {
        -webkit-appearance: none !important;
        appearance: none !important;
      }

      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none !important;
        appearance: none !important;
        width: var(--thumb-w, 10px) !important;
        height: var(--thumb-h, 14px) !important;
        background: white !important;
        border: 2px solid white !important;
        border-radius: 0 !important;
        cursor: pointer !important;
        box-shadow: none !important;
      }

      input[type='range']::-webkit-slider-thumb:hover {
        -webkit-appearance: none !important;
        width: var(--thumb-w, 10px) !important;
        height: var(--thumb-h, 14px) !important;
        background: white !important;
        border: 2px solid white !important;
        border-radius: 0 !important;
        box-shadow: none !important;
      }

      input[type='range']::-moz-range-thumb {
        appearance: none !important;
        width: var(--thumb-w, 10px) !important;
        height: var(--thumb-h, 14px) !important;
        background: white !important;
        border: 2px solid white !important;
        border-radius: 0 !important;
        cursor: pointer !important;
        box-shadow: none !important;
      }

      input[type='range']::-moz-range-thumb:hover {
        width: var(--thumb-w, 10px) !important;
        height: var(--thumb-h, 14px) !important;
        background: white !important;
        border: 2px solid white !important;
        border-radius: 0 !important;
        box-shadow: none !important;
      }
    </style>
  </head>
  <body>
    <!-- planet-shell lets planet.js grow the container for mobile layouts,
         same as the homepage embed -->
    <div id="planet-sketch-container" class="planet-shell"></div>
    <script src="/assets/libraries/p5.min.js"></script>
    <script src="/assets/planet/planet.js"></script>
  </body>
</html>
